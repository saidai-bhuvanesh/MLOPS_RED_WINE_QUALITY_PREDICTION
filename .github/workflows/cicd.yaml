name: CI/CD Pipeline for Wine Quality Prediction

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
        pip install -e .
        
    - name: Smoke test app import
      run: |
        python -c "import app"

    - name: Verify DVC lock consistency
      run: |
        dvc diff --md || echo "No DVC data drift detected"

    - name: Validate issue template filenames
      run: |
        python scripts/validate_templates.py

    - name: Run tests
      run: |
        python -m pytest tests/ -v
        
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Render
      run: |
        curl --fail --silent --show-error -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
