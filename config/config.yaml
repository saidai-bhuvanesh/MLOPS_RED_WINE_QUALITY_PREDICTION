# Environment tag: development | staging | production
# Override via ENV_TAG environment variable
env_tag: development

# Root directory for all pipeline artifacts
# Override via ENV_ARTIFACTS_ROOT
artifacts_root: artifacts


# Data Ingestion Stage
# Downloads the wine quality dataset from source_URL
# Override source_URL via ENV_DATA_INGESTION_SOURCE_URL
# Override root_dir via ENV_DATA_INGESTION_ROOT_DIR
data_ingestion:
  root_dir: artifacts/data_ingestion
  source_URL: https://github.com/entbappy/Branching-tutorial/raw/master/winequality-data.zip
  local_data_file: artifacts/data_ingestion/data.zip
  unzip_dir: artifacts/data_ingestion
  expected_checksum: ""
  
# Data Validation Stage
# Validates schema and column types of ingested data
# Override root_dir via ENV_DATA_VALIDATION_ROOT_DIR
data_validation:
  root_dir: artifacts/data_validation
  data_file: artifacts/data_ingestion/winequality-red.csv
  STATUS_FILE: artifacts/data_validation/status.txt
  reference_data_path: artifacts/reference_data.csv

# Data Transformation Stage
# Splits data into train/test sets with optional preprocessing
# Override root_dir via ENV_DATA_TRANSFORMATION_ROOT_DIR
# Override data_path via ENV_DATA_TRANSFORMATION_DATA_PATH
data_transformation:
  root_dir: artifacts/data_transformation
  data_path: artifacts/data_ingestion/winequality-red.csv
  preprocessor_path: artifacts/data_transformation/preprocessor.joblib

# Model Trainer Stage
# Trains ElasticNet regression model with configurable hyperparameters
# Override root_dir via ENV_MODEL_TRAINER_ROOT_DIR
# Override alpha via ENV_ELASTICNET_ALPHA
# Override l1_ratio via ENV_ELASTICNET_L1_RATIO
model_trainer:
  root_dir: artifacts/model_trainer
  train_data_path: artifacts/data_transformation/train.csv
  test_data_path: artifacts/data_transformation/test.csv
  model_name: model.joblib

# Model Evaluation Stage
# Computes RMSE, MAE, R2 metrics on test data
# Override root_dir via ENV_MODEL_EVALUATION_ROOT_DIR
# Override model_path via ENV_MODEL_EVALUATION_MODEL_PATH
model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: artifacts/data_transformation/test.csv
  model_path: artifacts/model_trainer/model.joblib
  metric_file_name: artifacts/model_evaluation/metrics.json

model_registry:
  registry_path: artifacts/model_registry.json
  production_alias: production
  staging_alias: staging
  max_versions_to_keep: 10
  quality_gate_max_rmse_degradation_pct: 5.0
  use_mlflow: true
  mlflow_tracking_uri: ./mlruns
  mlflow_experiment_name: wine_quality_prediction
  mlflow_registry_uri: ""
  mlflow_model_name: WineQualityElasticNet