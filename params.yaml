DataValidation:
  drift_threshold: 0.05

DataTransformation:
  test_size: 0.25
  random_state: 42
  stratify_column: quality
  min_samples_per_class: 4
  enable_per_class_evaluation: true
  feature_scaling:
    method: standard
    save_scaler_path: artifacts/data_transformation/scaler.joblib

Preprocessing:
  use_scaler: true
  scaler_type: standard
  handle_outliers: true
  outlier_method: iqr
  outlier_iqr_multiplier: 1.5
  impute_missing: true
  feature_engineering_flags:
    add_acidity_index: true
    add_alcohol_sugar_ratio: true
    add_free_sulfur_pct: true

ModelEvaluation:
  min_r2_threshold: 0.0  # Minimum acceptable R² - below this, model is worse than baseline
  per_class_r2_threshold: -0.5  # Minimum per-class R² - below this, model is rejected

ElasticNet:
  alpha: 0.2
  l1_ratio: 0.1
